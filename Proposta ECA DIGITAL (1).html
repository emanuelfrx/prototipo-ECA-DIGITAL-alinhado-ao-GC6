 de mitigação de riscos, integridade sistêmica e acessibilidade.",mediaEdu:"Fornece a base operacional para a transição pedagógica qualificada. Conecta as garantias clássicas do ECA de 1990 aos preceitos modernos da LGPD, responsabilizando a cadeia técnica industrial."}}},{id:2,chapter:"Capítulo III: Prevenção de Perigos e Conteúdos Nocivos",articles:"Artigo 6º",icon:"🛑",color:"#FF7675",textColor:"#FFFFFF",content:{child:{title:"As Portas Trancadas Contra Monstros",desc:"A lei proíbe que portais ruins apareçam para você. Coisas com brigas pesadas, violência, jogos de apostar dinheiro de adultos ou desafios bobos que fazem você se machucar ficam trancados pelo robô protetor para você brincar em paz.",mediaEdu:"O bloqueio proativo impede que a imaturidade emocional e cognitiva da criança seja explorada por anúncios de risco e conteúdos geradores de ansiedade sistêmica."},teen:{title:"Proteção Contra Tretas e Explorações",desc:"Plataformas são obrigadas por lei a conter riscos proativamente: bullying digital, desafios de automutilação, anúncios de drogas disfarçados e assédios virtuais. Você tem direito a canais fáceis, transparentes e seguros de ajuda imediata.",mediaEdu:"Defende a integridade psicossocial dos adolescentes contra campanhas informacionais predatórias, reforçando a cultura de letramento crítico contra discursos de ódio."},adult:{title:"Dever de Mitigação de Riscos Sistêmicos",desc:"Define o dever dos fornecedores em mapear e conter perigos capitais: abusos sexuais, violência autoinfligida induzida por algoritmos, comercialização clandestina de loterias, jogos de azar e práticas publicitárias predatórias.",mediaEdu:"O Art. 6º inverte o ônus da prova: as redes são obrigadas a mitigar danos na raiz do design, sob pena de corresponsabilidade civil quando ignoram a vulnerabilidade do usuário."}}},{id:3,chapter:"Capítulo IV & XV: Privacidade por Padrão e Autonomia",articles:"Artigos 7º, 8º, 38 e 39",icon:"🤐",color:"#55EFC4",textColor:"#2D3436",content:{child:{title:"A Capa de Invisibilidade Secreta",desc:"Você tem um segredo mágico! Nenhum site pode tirar suas fotos ou descobrir onde você mora. O robô liga uma capa protetora padrão por fábrica, escondendo suas coisas importantes para ninguém bisbilhotar.",mediaEdu:"Garante a aplicação estrita do Privacy by Design, impedindo a rastreabilidade comportamental infantil invisível por meio de trackers comerciais de cookies."},teen:{title:"Fim do Rastreador Invisível por Padrão",desc:"A privacidade máxima não é um botão oculto e confuso: ela deve vir ativada de fábrica! É proibida a coleta opaca de dados, leitura de contatos e sensores de movimento sem que você e seus pais escolham isso ativamente.",mediaEdu:"Neutraliza a sanha coletora da Big Tech, estabelecendo limites técnicos à espionagem de metadados de adolescentes para a formação de perfis hiper-focados de consumo."},adult:{title:"Privacy by Default e Gestão de Riscos de Dados",desc:"Garante que as configurações padrão de privacidade sejam sempre as mais restritivas. Obriga estudos de impacto de privacidade (DPIA) antes do lançamento do app e rotulagem explicativa de avisos de segurança nas embalagens físicas dos computadores e smartphones (Art. 38).",mediaEdu:"A segurança jurídica une-se à técnica: a validação de dados deve utilizar mecanismos de minimização, proibindo o tratamento de dados pessoais que cause ou facilite abusos."}}},{id:4,chapter:"Capítulo V: Verificação de Idade Sem Trapaças",articles:"Artigos 9º, 10, 11, 13, 14 e 15",icon:"🆔",color:"#B2BEC3",textColor:"#2D3436",content:{child:{title:"O Guardião do Portão da Idade",desc:"Para entrar em lugares que não são para crianças, o robô guardião precisa verificar a idade de verdade. Não vale só fingir o ano de nascimento clicando em botões falsos!",mediaEdu:"A infância requer limites protetivos físicos e lógicos. A verificação resguarda a exposição de mentes infantis ao material inadequado."},teen:{title:"Sistemas Inteligentes Contra Contas Falsas",desc:"Chega de rede social cheia de perfis fakes de adultos fingindo ser menores. A lei exige ferramentas seguras e auditáveis de detecção etária para impedir que pessoas perigosas mintam para enganar vocês nas suas salas digitais.",mediaEdu:"Evita a invasão de esferas de socialização juvenil por adultos predadores mal-intencionados através de mecanismos certificados de identidade digital de borda."},adult:{title:"Aferição Idônea de Faixa Etária e Regulação",desc:"Bane a mera autodeclaração de idade (como caixas de texto mutáveis). Exige mecanismos robustos, auditáveis e seguros que confirmem a compatibilidade de idade, sob parâmetros estritos que protegem a privacidade e eliminam a vigilância universal.",mediaEdu:"Inviabiliza a hipocrisia técnica corporativa histórica que permitia o ingresso facilitado de menores em redes violentas apenas para extrair volumes de público e monetização."}}},{id:5,chapter:"Capítulo VI & VII: Supervisão Participativa e Consentimento",articles:"Artigos 12, 16, 17 e 18",icon:"👨‍👩‍👧",color:"#74B9FF",textColor:"#2D3436",content:{child:{title:"A Chave dos Superpoderes Parental.br",desc:"Sempre que você quiser baixar um jogo legal, o celular joga um sinal de aviso na tela dos seus pais. Eles conversam com você e te dão a chave da autorização segura em um segundo!",mediaEdu:"Incentiva a mediação reflexiva, transformando o que antes era mera punição cega e invasão eletrônica de dados em uma parceria comunicativa de letramento seguro."},teen:{title:"Diga Adeus ao Loop de Contas de Urgência",desc:"Chega de cansaço extremo por causa de autoplay infinito e barulho no meio da noite. A lei dá a você o poder de mandar desligar recomendações algorítmicas viciantes e monitorar seu tempo de forma tranquila sem ser invadido.",mediaEdu:"Combate a perda do sono de adolescentes e a fadiga atencional, estipulando que o painel de mediação deve dar métricas claras sobre tempo de rede e opções de desativação."},adult:{title:"APIs de Idade, Governança Familiar ativa e Painéis",desc:"Cria APIs seguras para que as lojas de apps (Google Play, App Store) facilitem a mediação voluntária dos pais. Estes recebem painéis em português para restringir compras in-app, ver tempo de tela, gerenciar privacidade e escolher níveis de regras morais e pedagógicas.",mediaEdu:"A privacidade da criança e a soberania familiar trabalham juntas. As redes são proibidas de manipular interfaces que induzam ao enfraquecimento das ferramentas de supervisão parental ativa."}}},{id:6,chapter:"Capítulo VI (Art. 19º): Monitoramento Saudável vs. Espionagem",articles:"Artigo 19",icon:"🕵️",color:"#F1C40F",textColor:"#2D3436",content:{child:{title:"A Janela Sincera do Relógio",desc:"Se os seus pais precisarem usar um aplicativo para saber onde você está ou se aproximar para te proteger, o celular é obrigado por lei a te avisar com carinho e explicar por que faz isso, em termos simples!",mediaEdu:"O Art. 19 protege o laço afetivo de confiança, proibindo softwares ocultos de espionagem estrita (stalkerwares) aplicados a crianças de forma enganosa."},teen:{title:"Monitoramento Parental Não é Espionagem Secreta",desc:"A lei baniu a espionagem oculta! Se um app de monitoramento familiar estiver instalado em seu dispositivo, o fabricante é legalmente obrigado a alertar você em linguagem clara e destacar quais dados de localização e som estão sendo gravados.",mediaEdu:"Garante o direito psicológico à privacidade e o desenvolvimento da autodisciplina reflexiva do adolescente em detrimento do panóptico invisível de desconfiança familiar."},adult:{title:"Inviolabilidade de Dados e Ciência de Monitoramento",desc:"Obriga que qualquer fornecedor de monitoramento parental informe ativa e diretamente o menor sob supervisão, em linguagem acessível ao seu desenvolvimento, resguardando a inviolabilidade de arquivos não-correlacionados.",mediaEdu:"Desenvolve a corresponsabilidade democrática da família: a supervisão serve para guiar perigos específicos, não para invadir a privacidade ontológica do indivíduo em maturação."}}},{id:7,chapter:"Capítulo VII & VIII: Fim do Design de Cassino nos Jogos",articles:"Artigos 20 e 21",icon:"🎮",color:"#FAB1A0",textColor:"#2D3436",content:{child:{title:"Fim das Caixas Trapaceiras",desc:"Sabe aquelas caixas de sorte onde você gasta dinheiro de verdade tentando ganhar um prêmio legal, mas quase sempre vem porcaria inútil? A lei fechou a porta dessas armadilhas para proteger seu bolso!",mediaEdu:"Protege o desenvolvimento financeiro cognitivo infantil contra armadilhas algorítmicas de sorte baseadas em técnicas de vício em jogo de azar."},teen:{title:"Chega de Reforço Intermitente e Loot Boxes",desc:"Zero mecânicas de cassino para menores! O jogo e as partidas coordenadas devem mostrar preços exatos de itens visíveis, banindo caixas surpresas de chance randômica (Loot Boxes) para que você jogue sem ansiedade de apostador.",mediaEdu:"Elimina a indução precoce à ludopatia ao separar o ambiente do entretenimento juvenil dos loops neurais dopaminérgicos de apostas industriais."},adult:{title:"Bane Caixas de Recompensa (Loot Boxes)",desc:"Vedação absoluta da venda e oferta de caixas de recompensa randômicas em aplicativos de tecnologia dirigidos ou acessíveis a menores. Obriga que interações sociais por chats de voz e texto em partidas em rede padrão tenham aprovação no painel de pais.",mediaEdu:"Converte os jogos digitais de volta a espaços didáticos e recreativos, neutralizando os contatos predatórios indesejados e o consumismo descontrolado por meio de microtransações."}}},{id:8,chapter:"Capítulo VIII, IX & XI: Fim da Publicidade Espiã e Perfilamento",articles:"Artigos 22, 23, 24, 25 e 26",icon:"📢",color:"#A29BFE",textColor:"#2D3436",content:{child:{title:"Olhares Comerciais Longe de Você",desc:"Nenhum robô publicitário tem o direito de ler o que você sente (se está triste ou cansado) só para tentar te empurrar anúncios de brinquedos caros usando truques doidos de câmera!",mediaEdu:"Preserva as esferas lúdicas e educacionais da exploração comercial abusiva antes que o discernimento de consumo esteja sedimentado."},teen:{title:"Fim do Perfil Psicológico Oculto de Anúncios",desc:"É crime rastrear suas emoções, preferências secretas ou cliques de curtidas de ontem para construir uma ficha psicométrica invisível fútil voltada a te obrigar a comprar ou assinar canais. A propaganda para jovem deve ser limpa e transparente.",mediaEdu:"Blinda a diversidade psíquica e o direito de errar ou mudar sem que a Big Tech catalogue e perenize as escolhas efêmeras do adolescente para fins de mercado."},adult:{title:"Vedação do Perfilamento Psicométrico Comercial de Menor",desc:"Proíbe sumariamente o tratamento de dados de menores de idade para perfilamento, impulsionamento comercial direcionado ou análise emocional em realidades virtuais/estendidas. Bane a monetização de conteúdos erotizados infantis (Art. 23). Exige vinculação familiar de contas para menores de 16 (Art. 24).",mediaEdu:"Forte escudo de soberania de dados. Impede que a inteligência artificial corporativa faça engenharia social direcionada a mentes juvenis em fase de consolidação existencial."}}},{id:9,chapter:"Capítulo X, XI & XIII: Dever de Cuidado e Remoção Ágil",articles:"Artigos 27, 28, 29, 30, 31, 32 e 33",icon:"🚨",color:"#FD79A8",textColor:"#FFFFFF",content:{child:{title:"O Super Botão de Ajuda de Fábrica",desc:"Se alguém for mau ou postar fotos feias suas na rede, a lei obriga os donos do aplicativo a jogarem essa postagem no lixo muito rápido num piscar de olhos, vendo você protegido na hora!",mediaEdu:"Fornece sensação de acolhimento físico-virtual na internet, garantindo que o trauma infantil não se dissemine sem socorro técnico célere."},teen:{title:"Auto-Defesa Ativa e Remoção Célere",desc:"Plataformas digitais têm o dever civil de cuidado (Duty of Care) de deletar imagens de abuso, assédios sérios, vazamentos escolares e mentiras predatórias sobre você na hora. Você possui direito a canais fáceis e imediatos de ação e apelação honesta.",mediaEdu:"Potencializa a agência de cidadania jurídica dos adolescentes, forçando redes de contato de larga escala a servirem de aliadas no resgate atencional."},adult:{title:"Responsabilidade das Redes, Relatórios e Abuso de Denúncia",desc:"Responsabiliza as redes por omissão, obrigando a exclusão célere num prazo restritivo. Plataformas com mais de 1 milhão de usuários cadastrados devem publicar relatórios semestrais de risco (Art. 31º). Há punições sérias contra denúncias caluniosas vexatórias corporativas (Art. 32 e 33).",mediaEdu:"Um divisor de águas: as redes sociais assumem responsabilidade sobre as dinâmicas sociais degradantes e os ataques organizados em suas plataformas quando se recusam a agir."}}},{id:10,chapter:"Capítulo XIV ao XVI: Fiscalização Rígida de Órgão e Multas",articles:"Artigos 34, 35, 36, 37, 41 e 41-A",icon:"⚖️",color:"#D63031",textColor:"#FFFFFF",content:{child:{title:"As Super Punições de Castigo",desc:"Se as empresas gringas donas de redes desobedecerem ao ECA Digital, o xerife cobra multas gigantescas e pode mandar prender ou trancar o portal delas no Brasil!",mediaEdu:"Atribui peso e credibilidade às regras na visão infantil, mostrando que leis não são apenas conselhos fracos."},teen:{title:"Leis Fortes Com Garras Práticas",desc:"Sem impunidade para as Big Techs! Multas severas de até 50 milhões de reais ou até 10% do seu faturamento global forçam o cumprimento integral das regras. A autoridade autônoma de regulação fiscaliza incansavelmente cada canto da rede.",mediaEdu:"Ensina o adolescente sobre os mecanismos reais de enforcement das democracias modernas sobre o poder quase feudal de gigantes industriais transnacionais de tecnologia."},adult:{title:"Governança, Multas Administrativas e Vigência",desc:"Institui a Autoridade Administrativa Autônoma (Art. 34º) para fiscalização nacional. Impõe multas severas cumulativas de até R$ 50.000.000 por infração, suspensão de furos publicitários ou até proibição total de atividades. Vigência estipulada a partir de 17 de março de 2026 (Art. 41-A).",mediaEdu:"Consolida o ECA Digital como ferramenta soberana dotada de coerção financeira prática de alta escala, forçando o compliance técnico e retirando a internet brasileira de uma zona de vácuo normativo."}}}],ze=()=>{if(O.trim()==="")return;const H=O.toLowerCase();let Ce="";H.includes("loot box")||H.includes("caixa")||H.includes("jogo de azar")||H.includes("baú")?Ce="🎮 Artigos 20 e 21: O ECA Digital baniu as Loot Boxes (caixas de sorte pagas) por induzirem as crianças a dinâmicas de dopamina e risco parecidas com caça-níqueis. Apenas itens com entrega e preço certos são liberados!":H.includes("dark patterns")||H.includes("truque")||H.includes("manipulador")||H.includes("timer")?Ce="🕵️ Artigo 6º, V: É ilegal usar design manipulativo (cores falsas, cronômetros mentirosos ou botão de sair inacessível) para prender a atenção ou extorquir o usuário a clicar em assinar.":H.includes("dados")||H.includes("privacidade")||H.includes("cookie")||H.includes("foto")||H.includes("rastrear")?Ce="🤐 Artigos 7º e 12: A privacidade deve ser padrão de fábrica (Privacy by Default). A Big Tech não pode monitorar clicks, ler contatos ou registrar localizações para fins comerciais sem consentimento de verdade!":H.includes("pais")||H.includes("mãe")||H.includes("pai")||H.includes("responsável")||H.includes("supervisão")?Ce="👨‍👩‍👧 Artigos 16 a 18: Seus pais têm o poder de supervisão assistida cooperada. As redes devem fornecer painéis simples de tempo de tela e controle de transações, mas sem permitir espionagem silenciosa.":H.includes("idade")||H.includes("idade minima")||H.includes("verificação")?Ce="🆔 Artigos 9º a 11: Fica proibida a simples autodeclaração. Plataformas maduras precisam usar validação confiável de idade sem coletar dados sensíveis, impedindo fakes predadores.":H.includes("propaganda")||H.includes("anúncio")||H.includes("perfilamento")||H.includes("marketing")?Ce="📢 Artigo 22: É expressamente proibi
